.shbtn:active{background:var(--s2)}.shbtn.tg{background:rgba(10,132,255,.12);border-color:rgba(10,132,255,.3);color:var(--blue)}

.att-btn.vision-ok{border-color:rgba(48,209,88,.4);color:var(--gr)}

<script>
// ════════ CONFIG ════════
const CFG={
  API:(()=>{const p=new URLSearchParams(window.location.search);let u=p.get('api')||'https://huzaoobo-production.up.railway.app';if(u&&!u.startsWith('http'))u='https://'+u;return u.replace(/\/$/,'');})(),
  SQ_KEY:(()=>{const p=new URLSearchParams(window.location.search);return p.get('sqkey')||p.get('key')||'';})(),
  SQ_URL:'https://api.onlysq.ru/ai/openai/chat/completions',
  PI:'https://image.pollinations.ai/prompt/',
  PA:'https://gen.pollinations.ai/audio/',
  PV:'https://videos.pollinations.ai/',
};
// ════════ MODELS ════════
const MO={
  gpt52_chat:{n:'gpt-5.2-chat',l:'💬 GPT-5.2 Chat',v:0,pr:0},
  gpt52:{n:'gpt-5.2',l:'⚡ GPT-5.2',v:1,pr:1},
  claude_haiku:{n:'claude-haiku-4-5',l:'💎 Claude Haiku 4.5',v:1,pr:0},
  claude_sonnet:{n:'claude-sonnet-4-5',l:'🔷 Claude Sonnet 4.5',v:1,pr:1},
  claude_opus:{n:'claude-opus-4-5',l:'🔵 Claude Opus 4.5',v:1,pr:1},
  gemini_fl:{n:'gemini-2.5-flash',l:'🔥 Gemini 2.5 Flash',v:1,pr:0},
  gemini_pr:{n:'gemini-2.5-pro',l:'💎 Gemini 2.5 Pro',v:1,pr:1},
  gemini_3f:{n:'gemini-3-flash',l:'🚀 Gemini 3 Flash',v:1,pr:0},
  dsv3:{n:'deepseek-v3',l:'🧬 DeepSeek V3',v:0,pr:0},
  dsr1:{n:'deepseek-ai/DeepSeek-R1-0528',l:'🧠 DeepSeek R1',v:0,pr:0},
  qwen:{n:'qwen3-max',l:'🌐 Qwen3-Max',v:0,pr:0},
  sonar:{n:'sonar',l:'🌐 Sonar (веб-поиск)',v:0,pr:0},
};
const CATS=[{h:'💬 GPT',k:['gpt52_chat','gpt52']},{h:'🔵 Claude',k:['claude_haiku','claude_sonnet','claude_opus']},{h:'🔮 Gemini',k:['gemini_fl','gemini_pr','gemini_3f']},{h:'🧬 DeepSeek / Другие',k:['dsv3','dsr1','qwen','sonar']}];
const SUGG=['🔬 Объясни квантовую запутанность','💻 Напиши Python скрипт','📐 Реши x²+5x+6=0','✍️ Стихотворение о весне'];
const IEX=['🏙 Неоновый Токио, киберпанк','🌲 Лесная хижина осенью','🚀 Космическая станция','🦁 Лев в короне, фэнтези'];
const MEX=['Вдохновляющий гимн, оркестр','Меланхоличная ночь, пианино lo-fi','Рэп о мечтах, trap'];
const MSTY=['Поп','Электронная','Lo-fi','Рок','Хип-хоп','Трэп','Джаз','Классика'];
// ════════ STATE ════════
const S={mdl:'gpt52_chat',hist:[],sess:[],cur:null,busy:0,mc:0,ic:0,tgu:null,pi:null,mum:'suno',vum:'wan',lim:{pro_used:0,pro_max:30,img_used:0,img_max:0,music_used:0,music_max:0,video_used:0,video_max:0,has_sub:false,sub_plan:'',sub_expires:'',level:0,level_max:50,referrals:0,join_date:'',model:'',mode:'',total_requests:0,total_gens:0,reset_in:''}};
// Глобальное хранилище текстов сообщений (безопасное — без inline JS)
const _msgStore=[];
// ════════ TG ════════
const tg=window.Telegram?.WebApp;
if(tg){
  tg.ready();
  tg.expand();
  tg.setHeaderColor?.('#000');
  tg.setBackgroundColor?.('#000');
  tg.enableClosingConfirmation?.();
  S.tgu=tg.initDataUnsafe?.user||null;
  if(!S.tgu){setTimeout(()=>{S.tgu=tg.initDataUnsafe?.user||null;if(S.tgu){loadLimits();updSBUser();}},600);}
}
const hap=t=>tg?.HapticFeedback?.impactOccurred(t||'light');
// ════════ MD ════════
function setupMD(){
  const r=new marked.Renderer();
  r.code=(code,lang)=>{const l=lang||'text';let hi=code;try{hi=hljs.getLanguage(l)?hljs.highlight(code,{language:l}).value:hljs.highlightAuto(code).value;}catch(e){}return`<div class="cb"><div class="ct"><span class="cl">${esc(l)}</span><button class="cc" onclick="cpc(this)">📋 Скопировать</button></div><pre><code class="hljs">${hi}</code></pre></div>`;};
  r.table=(h,b)=>`<div class="tw"><table><thead>${h}</thead><tbody>${b}</tbody></table></div>`;
  marked.use({renderer:r,breaks:true,gfm:true});
}
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const rmd=t=>{try{return marked.parse(t)}catch(e){return esc(t).replace(/\n/g,'<br>')}};
function rk(el){if(!window.renderMathInElement)return;try{renderMathInElement(el,{delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false},{left:'\\[',right:'\\]',display:true},{left:'\\(',right:'\\)',display:false}],throwOnError:false});}catch(e){}}
function fallbackCopy(t,cb){const el=document.createElement('textarea');el.value=t;el.style.cssText='position:fixed;opacity:0;top:0;left:0;pointer-events:none';document.body.appendChild(el);el.focus();el.select();try{document.execCommand('copy');if(cb)cb();}catch(e){}document.body.removeChild(el);}
function cpc(b){const t=b.closest('.cb').querySelector('code').innerText;const done=()=>{b.textContent='✅ Скопировано';b.classList.add('ok');setTimeout(()=>{b.textContent='📋 Скопировать';b.classList.remove('ok');},2000);};if(navigator.clipboard){navigator.clipboard.writeText(t).then(done).catch(()=>fallbackCopy(t,done));}else{fallbackCopy(t,done);}}
// ════════ CHAT RENDER ════════
const hwlc=()=>document.getElementById('wlc')?.classList.add('g');
function addU(txt,imgData){hwlc();const m=document.getElementById('msgs');const d=document.createElement('div');d.className='mr u';const imgHtml=imgData?`<img class="umsg-img" src="data:image/jpeg;base64,${imgData}" alt="фото"/>`:'' ;d.innerHTML=`<div class="mc"><div class="bu">${imgHtml}${esc(txt).replace(/\n/g,'<br>')}</div></div><div class="av">👤</div>`;m.appendChild(d);sd();}
function addA(){const m=document.getElementById('msgs');const d=document.createElement('div');d.className='mr a';d.innerHTML=`<div class="av">🤖</div><div class="mc"><div class="bu"><div class="td"><span></span><span></span><span></span></div><div class="ac" style="display:none"></div></div><div class="msg-actions"></div></div>`;m.appendChild(d);sd();return{td:d.querySelector('.td'),ac:d.querySelector('.ac'),el:d};}
const sd=()=>{const m=document.getElementById('msgs');requestAnimationFrame(()=>{m.scrollTop=m.scrollHeight;});};
// Добавить кнопки действий к сообщению (используем _msgStore чтобы избежать проблем с экранированием)
function addMsgActions(el,text){
  const act=el?.querySelector('.msg-actions');
  if(!act)return;
  const idx=_msgStore.length;
  _msgStore.push(text);
  act.innerHTML=`<button class="mact" onclick="cpMsg(this,${idx})">📋 Копировать</button><button class="mact" onclick="openShareIdx(${idx})">📤 Поделиться</button>`;
  el.classList.add('show-act');
}
// ════════ SEND — 3 стратегии ════════
async function send(){
  const inp=document.getElementById('inp');const txt=inp.value.trim();
  if(!txt||S.busy)return;
  // Ждём получения пользователя из Telegram (до 2 сек)
  if(!S.tgu&&tg){for(let i=0;i<8;i++){await new Promise(r=>setTimeout(r,250));S.tgu=tg.initDataUnsafe?.user||null;if(S.tgu)break;}}
  inp.value='';rsz(inp);document.getElementById('snd').disabled=true;S.busy=1;S.mc++;
  const imgData=S.pi;S.pi=null;document.getElementById('pprev').classList.remove('s');
  updAttBtn();
  addU(txt,imgData);
  if(imgData){S.hist.push({role:'user',content:[{type:'image_url',image_url:{url:`data:image/jpeg;base64,${imgData}`}},{type:'text',text:txt}]});}
  else{S.hist.push({role:'user',content:txt});}
  const{td,ac,el}=addA();let full='';
  let _typBuf='';let _typQ=[];let _typRaf=null;
  const _sonar=S.mdl==='sonar';
  const _stripCit=s=>s.replace(/\s*\[\d+(?:[,\s]+\d+)*\]/g,'').replace(/\[\[?\d+\]?\]/g,'');
  const _doTyp=()=>{
    if(!_typQ.length){_typRaf=null;return;}
    const n=Math.min(Math.max(4,Math.ceil(_typQ.length/8)),30);
    _typBuf+=_typQ.splice(0,n).join('');
    const rendered=_sonar?_stripCit(_typBuf):_typBuf;
    ac.innerHTML=rmd(rendered)+'<span class="cur"></span>';rk(ac);sd();
    _typRaf=requestAnimationFrame(_doTyp);
  };
  const onChunk=chunk=>{
    if(td.style.display!=='none'){td.style.display='none';ac.style.display='block';}
    full+=chunk;_typQ.push(...chunk.split(''));
    if(!_typRaf)_typRaf=requestAnimationFrame(_doTyp);
  };
  let ok=false;
  // ─ СТРАТЕГИЯ 1: Backend ─
  if(!ok){
    try{
      const initD=tg?.initData||'';const uid=S.tgu?.id||null;
      const body={model:S.mdl,messages:S.hist.slice(-20),stream:true,init_data:initD,uid:uid};
      if(imgData)body.images=[imgData];
      const r=await fetch(`${CFG.API}/api/chat`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body),signal:AbortSignal.timeout(90000)});
      if(r.status===405||r.status===403||r.status===404){dbg(`Backend ${r.status} → пробую SQ Direct`);}
      else if(!r.ok){const t=await r.text().catch(()=>'');throw new Error(`Backend HTTP ${r.status}: ${t.slice(0,100)}`);}
      else{await readSSE(r,onChunk);ok=true;}
    }catch(e){if(!ok)dbg('Backend fail: '+e.message);}
  }
  // ─ СТРАТЕГИЯ 2: OnlySQ напрямую ─
  if(!ok&&CFG.SQ_KEY){
    try{
      dbg('Пробую OnlySQ Direct...');
      const model=MO[S.mdl];
      const r=await fetch(CFG.SQ_URL,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${CFG.SQ_KEY}`},body:JSON.stringify({model:model.n,messages:[{role:'system',content:'Ты — ИИ-ассистент ХУЗА. Отвечай на языке пользователя. Используй LaTeX: $формула$. Код в ```lang блоках.'},...S.hist.slice(-20)],stream:true,max_tokens:4096}),signal:AbortSignal.timeout(90000)});
      if(!r.ok){const t=await r.text().catch(()=>'');throw new Error(`SQ HTTP ${r.status}: ${t.slice(0,150)}`);}
      await readSSE(r,onChunk);ok=true;dbg('');
    }catch(e){dbg('SQ Direct fail: '+e.message);}
  }
  // ─ СТРАТЕГИЯ 3: Backend без стрима ─
  if(!ok){
    try{
      dbg('Пробую backend no-stream...');
      const body={model:S.mdl,messages:S.hist.slice(-20),stream:false,init_data:tg?.initData||'',uid:S.tgu?.id||null};
      if(imgData)body.images=[imgData];
      const r=await fetch(`${CFG.API}/api/chat`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body),signal:AbortSignal.timeout(90000)});
      if(!r.ok)throw new Error(`HTTP ${r.status}`);
      const d=await r.json();const t=d.answer||d.text||d.content||d.choices?.[0]?.message?.content||'';
      if(t){onChunk(t);ok=true;dbg('');}
    }catch(e){dbg('Backend no-stream fail: '+e.message);}
  }
  // Ждём очередь печатания
  await new Promise(res=>{const w=()=>{if(_typQ.length===0&&!_typRaf){res();}else{setTimeout(w,30);}};w();});
  if(!ok){
    td.style.display='none';ac.style.display='block';
    ac.innerHTML=`<div style="color:var(--re);font-size:14px;margin-bottom:6px">⚠️ Нет соединения с ИИ</div>
    <div style="font-size:13px;color:var(--tx4);line-height:1.7;background:var(--s1);border-radius:12px;padding:12px">
      Бот не отвечает. Возможно, Railway сервер не запущен.<br>
      <a href="${CFG.API}/api/chat" target="_blank" style="color:var(--blue);margin-top:4px;display:inline-block">🔍 Проверить сервер →</a>
    </div>`;
  }
  ac.querySelectorAll('.cur').forEach(c=>c.remove());
  if(full){
    const finalText=_sonar?_stripCit(full):full;
    ac.innerHTML=rmd(finalText);rk(ac);
    S.hist.push({role:'assistant',content:finalText});saveHistory();
    addMsgActions(el,finalText);
  }
  updHist(txt);S.busy=0;document.getElementById('snd').disabled=!document.getElementById('inp').value.trim();sd();
  loadLimits();
}
async function readSSE(resp,cb){
  if(!resp.body){const d=await resp.json().catch(async()=>({text:await resp.text()}));const t=d.answer||d.text||d.content||d.choices?.[0]?.message?.content||'';if(t)cb(t);return;}
  const reader=resp.body.getReader();const dec=new TextDecoder();let buf='';
  while(true){let v,done;try{({value:v,done}=await reader.read());}catch(e){break;}if(done)break;buf+=dec.decode(v,{stream:true});const lines=buf.split('\n');buf=lines.pop()??'';
    for(const ln of lines){const raw=ln.replace(/^data:\s*/,'');if(!raw||raw==='[DONE]')continue;try{const j=JSON.parse(raw);const d=j.choices?.[0]?.delta?.content??j.answer??j.text??j.content??'';if(d)cb(d);}catch(e){if(ln.startsWith('data:')&&raw&&raw!=='[DONE]')cb(raw);}}
  }
  if(buf){const raw=buf.replace(/^data:\s*/,'');if(raw&&raw!=='[DONE]'){try{const j=JSON.parse(raw);const d=j.choices?.[0]?.delta?.content??j.answer??j.text??'';if(d)cb(d);}catch(e){}}}
}

let _limRetry=0;
async function loadLimits(){
  try{
    const uid=S.tgu?.id;
    const iData=tg?.initData||'';
    // Если нет ни uid, ни initData — подождём и повторим (до 5 раз)
    if(!uid&&!iData&&_limRetry<5){_limRetry++;setTimeout(loadLimits,600);return;}
    _limRetry=0;
    const params=new URLSearchParams();
    if(iData)params.set('init_data',iData);
    if(uid)params.set('uid',uid);
    const r=await fetch(`${CFG.API}/api/limits?${params}`,{signal:AbortSignal.timeout(10000)});
    if(!r.ok)return;
    const d=await r.json();
    if(!d.ok)return;
    S.lim={
      pro_used:d.pro_used||0,
      pro_max:d.pro_max||30,
      img_used:d.img_used||0,
      img_max:d.img_max||0,
      music_used:d.music_used||0,
      music_max:d.music_max||0,
      video_used:d.video_used||0,
      video_max:d.video_max||0,
      has_sub:!!d.has_sub,
      sub_plan:d.sub_plan||d.plan||'',
      sub_expires:d.sub_expires||d.expires||'',
      level:d.level||0,
      level_max:d.level_max||50,
      referrals:d.referrals||0,
      join_date:d.join_date||'',
      model:d.model||'',
      mode:d.mode||'',
      total_requests:d.total_requests||d.requests||0,
      total_gens:d.total_gens||d.generations||0,
      reset_in:d.reset_in||''
    };
    const left=Math.max(0,S.lim.pro_max-S.lim.pro_used);
    const rqBtn=document.getElementById('rqbtn');
    const rqNum=document.getElementById('rqnum');
    const rqMax=document.getElementById('rqmax');
    if(rqNum)rqNum.textContent=left;
    if(rqMax)rqMax.textContent=' /'+S.lim.pro_max;
    if(rqBtn){
      rqBtn.style.borderColor=left<=3?'rgba(255,69,58,.5)':left<=10?'rgba(255,214,10,.4)':'transparent';
      rqBtn.title=`Запросов осталось: ${left} из ${S.lim.pro_max}`;
    }
    document.getElementById('sbap').textContent=S.lim.has_sub?(S.lim.sub_plan||'Pro'):'Free';
  }catch(e){}
}

function _limRow(ico,label,used,max,suffix){
  if(max<=0)return`<div class="limr"><span class="lico">${ico}</span><span class="limt">${label}</span><span class="limv" style="color:var(--tx4)">недоступно</span></div>`;
  const left=Math.max(0,max-used);

}

async function gImg(){
  const p=document.getElementById('gip')?.value.trim();
  if(!p){toast('⚠️ Введи описание','er');return;}
  ld('gibtn',1);const pr=pg('gipw','gipf');
  document.getElementById('gires')?.classList.remove('s');
  try{
    const m=document.getElementById('gim')?.value||'flux';
    const ratio=document.getElementById('giratio')?.value||'1:1';
    const uid=S.tgu?.id||0;
    const r=await fetch(`${CFG.API}/api/imggen`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({prompt:p,model:m,ratio,uid,init_data:tg?.initData||''}),
      signal:AbortSignal.timeout(60000)
    });
    const d=await r.json();
    if(!d.ok){
      if(d.error==='img_limit_exceeded'||d.error==='limit_exceeded'){toast('❌ Лимит генераций исчерпан. Купи подписку!','er');}
      else if(d.error==='subscription_required'){toast('❌ Нужна подписка для генерации','er');}
      else{toast('❌ '+(d.error||'Ошибка генерации'),'er');}
      pr.done();ld('gibtn',0);return;
    }
    const img=document.getElementById('giimg');
    if(d.image_b64){img.src='data:image/jpeg;base64,'+d.image_b64;}
    else if(d.url){img.src=d.url;}
    else{img.src=`${CFG.PI}${encodeURIComponent(p)}?model=${m}&nologo=true&seed=${Date.now()}`;}
    await new Promise((ok,fail)=>{img.onload=ok;img.onerror=fail;});
    document.getElementById('gires')?.classList.add('s');
    S.ic++;loadLimits();toast('✅ Картинка готова!','ok');
  }catch(e){toast('❌ Ошибка: '+(e.message||'попробуй снова'),'er');}
  pr.done();ld('gibtn',0);
}

async function gMus(){const p=document.getElementById('mup')?.value.trim();if(!p){toast('⚠️ Введи описание','er');return;}ld('mubtn',1);const pr=pg('mupw','mupf');try{const model=S.mum==='suno'?'suno':'elevenmusic';const r=await fetch(`${CFG.PA}${encodeURIComponent(p)}?model=${model}&nologo=true`,{signal:AbortSignal.timeout(180000)});if(!r.ok)throw new Error('HTTP '+r.status);const bl=await r.blob();const a=document.getElementById('muaud');a.src=URL.createObjectURL(bl);a.__b=bl;document.getElementById('mures')?.classList.add('s');toast('🎵 Трек готов!','ok');}catch(e){toast('❌ '+e.message,'er');}pr.done();ld('mubtn',0);}
const dlM=()=>{const a=document.getElementById('muaud');if(!a?.__b)return;Object.assign(document.createElement('a'),{href:URL.createObjectURL(a.__b),download:`track_${Date.now()}.mp3`}).click();};
async function gVid(){const p=document.getElementById('vip')?.value.trim();if(!p){toast('⚠️ Введи описание','er');return;}ld('vibtn',1);const pr=pg('vipw','vipf');try{const dur=document.getElementById('vid')?.value||'5';const ctrl=new AbortController();const to=setTimeout(()=>ctrl.abort(),150000);const r=await fetch(`${CFG.PV}${encodeURIComponent(p)}?model=${S.vum}&duration=${dur}&nologo=true`,{signal:ctrl.signal});clearTimeout(to);if(!r.ok)throw new Error('HTTP '+r.status);const bl=await r.blob();const v=document.getElementById('vivid');v.src=URL.createObjectURL(bl);v.__b=bl;document.getElementById('vires')?.classList.add('s');toast('🎬 Видео готово!','ok');}catch(e){toast(e.name==='AbortError'?'⏱ Таймаут':'❌ '+e.message,'er');}pr.done();ld('vibtn',0);}
const dlV=()=>{const v=document.getElementById('vivid');if(!v?.__b)return;Object.assign(document.createElement('a'),{href:URL.createObjectURL(v.__b),download:`video_${Date.now()}.mp4`}).click();};
async function apiPost(path,body){const r=await fetch(`${CFG.API}${path}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({...body,init_data:tg?.initData||''}),signal:AbortSignal.timeout(180000)});const d=await r.json();if(!d.ok)throw new Error(d.error||'Ошибка');return d;}
function b64dl(b64,fn,mime){const bl=new Blob([Uint8Array.from(atob(b64),c=>c.charCodeAt(0))],{type:mime});Object.assign(document.createElement('a'),{href:URL.createObjectURL(bl),download:fn}).click();}

// ════ ФОТО — исправлено: всегда открывает файловый диалог, Vision показывает подсказку ════
function attPhoto(){
  // Если модель не поддерживает Vision — предупреждаем, но НЕ блокируем
  // (бэкенд сам переключит на Vision-модель)
  if(!MO[S.mdl]?.v){
    toast('📷 Бэкенд выберет Vision-модель автоматически','');
  }
  document.getElementById('phi').click();
}
function onPhoto(e){
  const f=e.target.files[0];if(!f)return;
  // Проверяем размер — не более 10 МБ
  if(f.size>10*1024*1024){toast('❌ Фото слишком большое (макс. 10 МБ)','er');e.target.value='';return;}
  const r=new FileReader();
  r.onload=ev=>{
    S.pi=ev.target.result.split(',')[1];
    document.getElementById('pthumb').src=ev.target.result;
    document.getElementById('pprev').classList.add('s');
    const i=document.getElementById('inp');
    if(!i.value)i.value='Что на этом изображении?';
    rsz(i);
    document.getElementById('snd').disabled=false;
    toast('📷 Фото прикреплено','ok');
  };
  r.readAsDataURL(f);
  e.target.value='';
}
function rmPhoto(){S.pi=null;document.getElementById('pprev').classList.remove('s');}
let _tt;function toast(msg,t=''){const el=document.getElementById('toast');el.textContent=msg;el.className='toast s'+(t?' '+t:'');clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('s'),2800);}
function renderSuggest(){const c=document.getElementById('wch');if(!c)return;c.innerHTML='';SUGG.forEach(s=>{const d=document.createElement('div');d.className='wc';d.textContent=s;d.onclick=()=>{const i=document.getElementById('inp');i.value=s.replace(/^[^\s]+\s/,'');rsz(i);i.focus();hap();};c.appendChild(d);});}

async function shareLink(){
  try{
    const r=await fetch(`${CFG.API}/api/store_answer`,{method:'POST',headers:{'Content-Type':'application/json'},

function cpMsg(btn,idx){
  const text=_msgStore[idx]||'';

function buySubscription(plan){
  hap();
  const cmd=plan==='year'?'buy_year':'buy_month';
  // Отправляем команду боту через sendData или открываем бота
  if(tg){
    try{
      // Закрываем миниапп и открываем бота с командой оплаты
      tg.close();
      return;
    }catch(e){}
    // Fallback: открываем ссылку на бота
    const url='https://t.me/iihuzandelpiibot?start='+cmd;
    try{tg.openLink(url);}catch(e){window.open(url,'_blank');}
  }else{
    window.open('https://t.me/iihuzandelpiibot?start='+cmd,'_blank');
  }
  toast('💳 Открываю оплату...','ok');
}
