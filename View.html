<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Хуза ИИ — Ответ</title>
<!-- LZString для декодирования сжатых ссылок -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<style>
:root {
  --bg: #0a0a0f;
  --surface: #13131a;
  --surface2: #1c1c27;
  --surface3: #252535;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #f0f0ff;
  --text2: rgba(240,240,255,0.55);
  --text3: rgba(240,240,255,0.3);
  --accent: #5b6ef5;
  --accent2: #7c8ff7;
  --green: #34d399;
  --red: #f87171;
  --yellow: #fbbf24;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Manrope', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 20% 0%, rgba(91,110,245,0.1) 0%, transparent 60%),
    radial-gradient(ellipse 40% 30% at 80% 100%, rgba(155,90,245,0.07) 0%, transparent 50%);
  pointer-events: none; z-index: 0;
}
.page {
  position: relative; z-index: 1;
  max-width: 720px;
  margin: 0 auto;
  padding: 0 0 60px;
}

/* ── HEADER ── */
.header {
  padding: 16px 16px 14px;
  display: flex; align-items: center; gap: 10px;
  border-bottom: 1px solid var(--border);
  background: rgba(19,19,26,0.9);
  backdrop-filter: blur(16px);
  position: sticky; top: 0; z-index: 10;
}
.header-logo {
  width: 36px; height: 36px;
  border-radius: 10px;
  background: linear-gradient(135deg, #5b6ef5, #9b59b6);
  display: flex; align-items: center; justify-content: center;
  font-size: 17px; flex-shrink: 0;
  box-shadow: 0 4px 14px rgba(91,110,245,0.35);
}
.header-info { flex: 1; min-width: 0; }
.header-title { font-size: 14px; font-weight: 800; }
.header-sub { font-size: 10px; color: var(--text3); margin-top: 1px; }
.header-copy-btn {
  background: linear-gradient(135deg, #5b6ef5, #9b59b6);
  border: none;
  color: #fff;
  border-radius: 10px;
  padding: 7px 13px;
  font-size: 12px; font-weight: 700;
  font-family: 'Manrope', sans-serif;
  cursor: pointer; transition: all 0.15s; flex-shrink: 0;
  box-shadow: 0 3px 10px rgba(91,110,245,0.35);
}
.header-copy-btn:active { opacity: 0.7; transform: scale(0.97); }
.header-copy-btn.copied { background: linear-gradient(135deg, #34d399, #059669); box-shadow: 0 3px 10px rgba(52,211,153,0.35); }

/* ── MODEL BADGE ── */
.model-badge {
  margin: 14px 16px 0;
  display: inline-flex; align-items: center; gap: 7px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 5px 12px 5px 7px;
  font-size: 11px; font-weight: 700; color: var(--text2);
}
.model-badge-dot {
  width: 22px; height: 22px; border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px;
  background: linear-gradient(135deg, #5b6ef5, #9b59b6);
  overflow: hidden;
}
.model-badge-dot svg { width: 14px; height: 14px; }

/* ── CONTENT CARD ── */
.content-card {
  margin: 12px 14px 0;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 8px 40px rgba(0,0,0,0.4);
}
.content-inner {
  padding: 20px 20px 22px;
  font-size: 14px; line-height: 1.65; color: var(--text);
}

/* ── TYPOGRAPHY ── */
.content-inner h2 { font-size: 19px; font-weight: 800; margin: 18px 0 9px; color: #fff; }
.content-inner h3 { font-size: 16px; font-weight: 700; margin: 16px 0 7px; color: #fff; }
.content-inner h4 { font-size: 14px; font-weight: 700; margin: 13px 0 5px; color: var(--accent2); }
.content-inner p { margin-bottom: 8px; }
.content-inner p:last-child { margin-bottom: 0; }
.content-inner strong { font-weight: 700; color: #fff; }
.content-inner em { font-style: italic; color: var(--text2); }

/* ── LISTS ── */
.content-inner ul, .content-inner ol {
  margin: 6px 0 10px; padding-left: 0; list-style: none;
}
.content-inner li {
  position: relative; padding: 3px 0 3px 20px;
  color: var(--text); line-height: 1.6;
}
.content-inner ul li::before {
  content: '◆'; position: absolute; left: 0;
  color: var(--accent); font-size: 7px; top: 9px;
}
.content-inner ol { counter-reset: li; }
.content-inner ol li::before {
  counter-increment: li; content: counter(li);
  position: absolute; left: 0;
  background: var(--accent); color: #fff;
  width: 15px; height: 15px; border-radius: 4px;
  font-size: 9px; font-weight: 800;
  display: flex; align-items: center; justify-content: center;
  top: 5px;
}

/* ── INLINE CODE ── */
.content-inner code {
  background: rgba(255,255,255,0.08);
  padding: 1px 5px; border-radius: 4px;
  font-size: 12px; font-family: 'SF Mono','Fira Code',monospace;
  color: var(--accent2);
}

/* ── CODE BLOCKS ── */
.code-wrapper {
  position: relative; margin: 12px 0;
  border-radius: 14px; overflow: hidden;
  width: 100%; box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  border: 1px solid rgba(91,110,245,0.2);
}
.code-header {
  display: flex; justify-content: space-between; align-items: center;
  background: linear-gradient(135deg, #0d0e1a, #161726);
  padding: 9px 14px; font-size: 11px;
  color: rgba(255,255,255,0.5); font-family: "SF Mono","Fira Code",monospace;
  border-bottom: 1px solid rgba(91,110,245,0.15);
}
.code-header > span:first-child {
  display: inline-flex; align-items: center; gap: 6px;
  font-weight: 700; letter-spacing: 0.5px; color: var(--accent2);
}
.code-header > span:first-child::before {
  content: ''; display: inline-block;
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent); box-shadow: 0 0 6px rgba(91,110,245,0.6);
}
.copy-btn {
  background: rgba(91,110,245,0.12);
  border: 1px solid rgba(91,110,245,0.25);
  color: rgba(255,255,255,0.6);
  padding: 4px 12px; border-radius: 6px;
  font-size: 11px; cursor: pointer;
  transition: all 0.15s; font-family: 'Manrope',sans-serif; white-space: nowrap;
}
.copy-btn:active, .copy-btn.copied {
  background: rgba(52,211,153,0.2); color: #34d399; border-color: rgba(52,211,153,0.3);
}
.code-wrapper pre {
  margin: 0 !important; border-radius: 0 0 14px 14px !important;
  background: #0f1117 !important; padding: 16px !important;
  overflow-x: auto !important; white-space: pre !important;
  word-break: normal !important; word-wrap: normal !important;
  font-size: 12.5px !important; line-height: 1.7 !important;
  max-height: none !important;
}
.code-wrapper pre code {
  font-family: "SF Mono","Fira Code","Consolas",monospace !important;
  white-space: pre !important; word-break: normal !important;
  word-wrap: normal !important; display: block;
  background: none !important; border: none !important; padding: 0 !important;
  color: inherit !important;
}

/* ── TABLES ── */
.table-wrap {
  width: 100%; overflow-x: auto; margin: 12px 0;
  border-radius: 12px; border: 1px solid rgba(91,110,245,0.25);
  box-shadow: 0 2px 12px rgba(0,0,0,0.2);
}
.content-inner table {
  border-collapse: collapse; width: 100%;
  min-width: 340px; font-size: 13.5px;
}
.content-inner th {
  background: linear-gradient(135deg, #3d4fd4, #5b6ef5);
  color: #fff; padding: 11px 16px; text-align: left;
  font-weight: 700; font-size: 13px; letter-spacing: 0.3px; white-space: nowrap;
}
.content-inner td {
  padding: 10px 16px; border-bottom: 1px solid rgba(255,255,255,0.08);
  color: var(--text); line-height: 1.6; vertical-align: top; font-size: 13px;
}
.content-inner tr:nth-child(even) td { background: rgba(91,110,245,0.07); }
.content-inner tr:last-child td { border-bottom: none; }
.content-inner tr:hover td { background: rgba(255,255,255,0.05); }

/* ── KATEX ── */
.katex { font-size: 1em !important; }
.katex-display { overflow-x: auto; margin: 10px 0 !important; }
.katex-display-wrap {
  background: rgba(91,110,245,0.06);
  border: 1px solid rgba(91,110,245,0.15);
  border-radius: 10px;
  padding: 12px 16px;
  margin: 10px 0;
  overflow-x: auto;
  text-align: center;
}

/* ── BLOCKQUOTE ── */
.content-inner blockquote {
  border-left: 3px solid var(--accent);
  background: rgba(91,110,245,0.06);
  padding: 10px 14px; border-radius: 0 10px 10px 0;
  margin: 10px 0; color: var(--text2); font-style: italic;
}
.content-inner hr { border: none; border-top: 1px solid var(--border2); margin: 14px 0; }

/* ── FOOTER ── */
.footer {
  margin: 18px 14px 0;
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
}
.footer-info { font-size: 11px; color: var(--text3); flex: 1; }
.footer-open-btn {
  display: inline-flex; align-items: center; gap: 6px;
  background: linear-gradient(135deg, #5b6ef5, #9b59b6);
  color: #fff; border: none; border-radius: 12px;
  padding: 10px 18px; font-size: 13px; font-weight: 700;
  font-family: 'Manrope',sans-serif; cursor: pointer;
  text-decoration: none; box-shadow: 0 4px 16px rgba(91,110,245,0.35);
  transition: opacity 0.15s;
}
.footer-open-btn:active { opacity: 0.8; }

/* ── LOADING ── */
.loading {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 60vh; gap: 14px; color: var(--text3);
}
.loading-spinner {
  width: 38px; height: 38px;
  border: 3px solid var(--border2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── ERROR ── */
.error-box {
  margin: 40px 16px;
  background: rgba(248,113,113,0.08);
  border: 1px solid rgba(248,113,113,0.25);
  border-radius: 16px; padding: 24px; text-align: center;
}
.error-box-ico { font-size: 34px; margin-bottom: 10px; }
.error-box-title { font-size: 16px; font-weight: 800; color: #f87171; margin-bottom: 6px; }
.error-box-sub { font-size: 13px; color: var(--text2); line-height: 1.5; }

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }
</style>
</head>
<body>
<div class="page">
  <!-- HEADER -->
  <div class="header">
    <div class="header-logo">🤖</div>
    <div class="header-info">
      <div class="header-title">Хуза — Ответ ИИ</div>
      <div class="header-sub" id="headerSub">Загрузка...</div>
    </div>
    <button class="header-copy-btn" id="copyBtn" onclick="copyAll()">📋 Копировать</button>
  </div>

  <!-- LOADING -->
  <div class="loading" id="loadingState">
    <div class="loading-spinner"></div>
    <div>Загружаю ответ...</div>
  </div>

  <!-- ERROR -->
  <div class="error-box" id="errorState" style="display:none">
    <div class="error-box-ico">😔</div>
    <div class="error-box-title">Ответ не найден</div>
    <div class="error-box-sub">Ссылка недействительна или данные повреждены.<br>Попроси отправить ссылку заново.</div>
  </div>

  <!-- CONTENT -->
  <div id="mainContent" style="display:none">
    <div class="model-badge">
      <div class="model-badge-dot" id="modelDot">🤖</div>
      <span id="modelName">ИИ</span>
      <span style="color:var(--text3)">·</span>
      <span id="msgTime" style="color:var(--text3);font-weight:500"></span>
    </div>
    <div class="content-card">
      <div class="content-inner" id="contentInner"></div>
    </div>
    <div class="footer">
      <div class="footer-info">Создано в <strong style="color:var(--accent2)">Хуза ИИ</strong></div>
      <a class="footer-open-btn" href="https://t.me/iihuzandelpiibot" target="_blank">✈️ Открыть Хуза ИИ</a>
    </div>
  </div>
</div>

function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// ══════════════════════════════════════════════════════════
function formatText(rawText) {
  let text = rawText;
  const PH = {};
  let phIdx = 0;
  function protect(html) {
    const id = "\x00P" + (phIdx++) + "\x00";
    PH[id] = html;
    return id;
  }

  // 1. Code blocks — ПЕРВЫМИ чтобы не ломать содержимое
  text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
    const raw = code.trim();
    const esc = escHtml(raw);
    const lbl = lang ? lang.toUpperCase() : "CODE";
    return protect(`<div class="code-wrapper">
      <div class="code-header">
        <span>${lbl}</span>
        <button class="copy-btn" onclick="copyCode(this)">Копировать</button>
      </div>
      <pre><code class="${lang ? 'language-' + lang : ''}" data-raw="${esc.replace(/"/g,'&quot;')}">${esc}</code></pre>

    protect(`<div class="katex-display-wrap">$$${inner}$$</div>`));

  // 4. Tables — парсим markdown таблицы
  text = text.replace(/\n?((?:\|.+\|\n?)+)/g, (match) => {
    const lines = match.trim().split("\n").filter(l => l.trim());
    if (lines.length < 2) return match;
    const isSep = l => /^[\|\s\-:]+$/.test(l);
    let html = '<div class="table-wrap"><table>';
    let firstRow = true;
    for (const line of lines) {
      if (isSep(line)) continue;
      const cells = line.split("|").filter((_, i, a) => i > 0 && i < a.length - 1);
      if (firstRow) {
        html += '<tr>' + cells.map(c => `<th>${c.trim()}</th>`).join('') + '</tr>';
        firstRow = false;
      } else {
        html += '<tr>' + cells.map(c => `<td>${c.trim()}</td>`).join('') + '</tr>';
      }
    }
    html += '</table></div>';
    return protect(html);
  });

  // 5. Bold / italic
  text = text.replace(/\*\*\*(.+?)\*\*\*/g, "<strong><em>$1</em></strong>");
  text = text.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
  text = text.replace(/\*([^*\n]+?)\*/g, "<em>$1</em>");
  text = text.replace(/__(.+?)__/g, "<strong>$1</strong>");
  text = text.replace(/_([^_\n]+?)_/g, "<em>$1</em>");

  // 6. Headers
  text = text.replace(/^####\s+(.+)$/gm, "<h4 style='font-size:13px;color:var(--accent2);margin:10px 0 4px'>$1</h4>");
  text = text.replace(/^###\s+(.+)$/gm, "<h4>$1</h4>");
  text = text.replace(/^##\s+(.+)$/gm,  "<h3>$1</h3>");
  text = text.replace(/^#\s+(.+)$/gm,   "<h2>$1</h2>");

  // 7. Blockquote
  text = text.replace(/^>\s+(.+)$/gm, "<blockquote>$1</blockquote>");

  // 8. Numbered lists
  text = text.replace(/^(\d+)\.\s+(.+)$/gm, (_, n, content) =>
    `<li style="list-style:none;position:relative;padding-left:22px;margin-bottom:3px">` +
    `<span style="position:absolute;left:0;top:2px;background:var(--accent);color:#fff;` +
    `width:16px;height:16px;border-radius:4px;font-size:9px;font-weight:800;` +
    `display:inline-flex;align-items:center;justify-content:center">${n}</span>${content}</li>`
  );

  // 9. Bullet lists
  text = text.replace(/^[-*•]\s+(.+)$/gm,
    `<li style="list-style:none;position:relative;padding-left:16px;margin-bottom:3px">` +
    `<span style="position:absolute;left:0;top:7px;width:6px;height:6px;border-radius:50%;` +
    `background:var(--accent);display:inline-block"></span>$1</li>`
  );

  // 10. Inline code
  text = text.replace(/`([^`\n]+)`/g, (_, c) => `<code>${escHtml(c)}</code>`);

  // 11. HR
  text = text.replace(/^---+$/gm, "<hr>");

  // 12. Newlines → <br>
  text = text.replace(/\n/g, "<br>");

  // 13. Restore placeholders
  for (const [id, html] of Object.entries(PH)) {
    text = text.split(id).join(html);
  }

  return text;
}

function copyCode(btn) {
  const codeEl = btn.closest(".code-wrapper").querySelector("code");
  const raw = codeEl ? (codeEl.getAttribute("data-raw") || codeEl.innerText) : "";
  const decoded = raw.replace(/&amp;/g,"&").replace(/&lt;/g,"<").replace(/&gt;/g,">").replace(/&quot;/g,'"');
  navigator.clipboard.writeText(decoded).then(() => {
    btn.textContent = "✓ Скопировано"; btn.classList.add("copied");
    setTimeout(() => { btn.textContent = "Копировать"; btn.classList.remove("copied"); }, 1800);
  });
}

let rawAnswerText = "";
function copyAll() {
  navigator.clipboard.writeText(rawAnswerText).then(() => {
    const btn = document.getElementById("copyBtn");

  });
}

// ══════════════════════════════════════════════════
// DECODE — поддержка ОБОИХ форматов:
//   #z=...   — новый LZ-сжатый (КОРОТКИЙ)
//   #data=.. — старый base64 (совместимость)
// ══════════════════════════════════════════════════
function getDataFromUrl() {
  const hash   = location.hash;
  const search = location.search;
  let encoded = "", mode = "";

  if (hash.startsWith("#z=")) {
    encoded = hash.slice(3); mode = "lz";
  } else if (hash.startsWith("#data=")) {
    encoded = hash.slice(6); mode = "b64";
  } else if (search) {
    const p = new URLSearchParams(search);
    if (p.get("z"))      { encoded = p.get("z"); mode = "lz"; }
    else if (p.get("d")) { encoded = p.get("d"); mode = "b64"; }
  }
  return { encoded, mode };
}

function decodeData(encoded, mode) {
  try {
    if (mode === "lz") {
      const json = LZString.decompressFromEncodedURIComponent(encoded);
      return JSON.parse(json);
    } else {
      const b64  = encoded.replace(/-/g, "+").replace(/_/g, "/");
      const json = decodeURIComponent(escape(atob(b64)));
      return JSON.parse(json);
    }
  } catch(e) { return null; }
}

// ── Init ─────────────────────────────────────────────────
window.addEventListener("DOMContentLoaded", () => {
  const { encoded, mode } = getDataFromUrl();

  if (!encoded) {
    document.getElementById("loadingState").style.display = "none";
    document.getElementById("errorState").style.display = "block";
    return;
  }

  const data = decodeData(encoded, mode);
  if (!data || !data.text) {
    document.getElementById("loadingState").style.display = "none";
    document.getElementById("errorState").style.display = "block";
    return;
  }

  rawAnswerText = data.text;

  // Header
  document.getElementById("modelName").textContent = data.model || "ИИ";
  document.getElementById("msgTime").textContent   = data.time  || "";
  document.getElementById("headerSub").textContent = `${data.model || "ИИ"} · ${data.time || ""}`;
  document.title = "Хуза ИИ · " + (data.model || "ИИ");

  // Model dot
  const style = getModelStyle(data.modelKey || "");
  const dot   = document.getElementById("modelDot");
  dot.style.background = style.bg;
  dot.innerHTML = style.icon;

  // Render content
  const contentEl = document.getElementById("contentInner");
  contentEl.innerHTML = formatText(data.text);

  // Highlight.js — подсветка кода
  contentEl.querySelectorAll("pre code").forEach(block => {
    hljs.highlightElement(block);
  });

  // KaTeX — рендер формул ПОСЛЕ highlight
  try {
    renderMathInElement(contentEl, {
      delimiters: [
        { left: "$$",  right: "$$",  display: true  },
        { left: "$",   right: "$",   display: false },
        { left: "\\(", right: "\\)", display: false },
        { left: "\\[", right: "\\]", display: true  },
      ],
      throwOnError: false,
      errorColor: "#f87171",
      strict: false,
    });
  } catch(e) { console.warn("KaTeX:", e); }

  // Show
  document.getElementById("loadingState").style.display = "none";
  document.getElementById("mainContent").style.display  = "block";

  // Share button
  document.getElementById("copyBtn").onclick = () => shareAnswer(data);
  document.getElementById("copyBtn").textContent = "✈️ Поделиться";
});

function shareAnswer(data) {
  const viewUrl   = window.location.href;
  const modelName = data.model || "ИИ";
  const preview   = (data.text || "").replace(/[*_`#\[\]]/g,"").substring(0,120).trim();
  const previewText = preview.length >= 120 ? preview + "..." : preview;
  const tgShareUrl  = `https://t.me/share/url?url=${encodeURIComponent(viewUrl)}&text=${encodeURIComponent(`🤖 Хуза ИИ — Ответ\nМодель: ${modelName}\n\n${previewText}`)}`;

  if (window.Telegram && window.Telegram.WebApp) {
    try { window.Telegram.WebApp.openTelegramLink(tgShareUrl); return; } catch(e) {}
  }
  window.open(tgShareUrl, "_blank");
  navigator.clipboard.writeText(viewUrl).catch(() => {});

  const btn = document.getElementById("copyBtn");
  const orig = btn.textContent;
  btn.textContent = "✅ Скопировано!"; btn.classList.add("copied");
  setTimeout(() => { btn.textContent = orig; btn.classList.remove("copied"); }, 2500);
}
