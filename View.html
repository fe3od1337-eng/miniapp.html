<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Хуза ИИ — Ответ</title>
<!-- LZString для декодирования сжатых ссылок -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<style>
:root {
  --bg: #0a0a0f;
  --surface: #13131a;
  --surface2: #1c1c27;
  --surface3: #252535;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #f0f0ff;
  --text2: rgba(240,240,255,0.55);
  --text3: rgba(240,240,255,0.3);
  --accent: #5b6ef5;
  --accent2: #7c8ff7;
  --green: #34d399;
  --red: #f87171;
  --yellow: #fbbf24;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  font-family: 'Manrope', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 20% 0%, rgba(91,110,245,0.1) 0%, transparent 60%),
    radial-gradient(ellipse 40% 30% at 80% 100%, rgba(155,90,245,0.07) 0%, transparent 50%);
  pointer-events: none; z-index: 0;
}
.page {
  position: relative; z-index: 1;
  max-width: 720px;
  margin: 0 auto;
  padding: 0 0 60px;
}

/* ── LOADING / ERROR STATES ── */
#loadingState, #errorState {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 100vh; padding: 40px 20px;
  text-align: center;
}
#loadingState .spinner {
  width: 50px; height: 50px;
  border: 4px solid var(--border2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin-bottom: 20px;
}
@keyframes spin { to { transform: rotate(360deg); } }
#errorState { color: var(--red); }
#mainContent { display: none; }

/* ── HEADER ── */
.header {
  padding: 16px 16px 14px;
  display: flex; align-items: center; gap: 10px;
  border-bottom: 1px solid var(--border);
  background: rgba(19,19,26,0.95);
  backdrop-filter: blur(16px);
  position: sticky; top: 0; z-index: 10;
}
.header-logo {
  width: 36px; height: 36px;
  border-radius: 10px;
  background: linear-gradient(135deg, #5b6ef5, #9b59b6);
  display: flex; align-items: center; justify-content: center;
  font-size: 17px; flex-shrink: 0;
  box-shadow: 0 4px 14px rgba(91,110,245,0.35);
}
.header-info { flex: 1; min-width: 0; }
.header-title { font-size: 14px; font-weight: 800; }
.header-sub { font-size: 10px; color: var(--text3); margin-top: 1px; }
.header-copy-btn {
  background: linear-gradient(135deg, #5b6ef5, #9b59b6);
  border: none;
  color: #fff;
  border-radius: 10px;
  padding: 7px 13px;
  font-size: 12px; font-weight: 700;
  font-family: 'Manrope', sans-serif;
  cursor: pointer; transition: all 0.15s; flex-shrink: 0;
  box-shadow: 0 3px 10px rgba(91,110,245,0.35);
}
.header-copy-btn:active { opacity: 0.7; transform: scale(0.97); }
.header-copy-btn.copied { background: linear-gradient(135deg, #34d399, #059669); box-shadow: 0 3px 10px rgba(52,211,153,0.35); }

/* ── MODEL BADGE ── */
.model-badge {
  margin: 14px 16px 0;
  display: inline-flex; align-items: center; gap: 7px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 5px 12px 5px 7px;
  font-size: 11px; font-weight: 700; color: var(--text2);
}
.model-badge-dot {
  width: 22px; height: 22px; border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px;
  background: linear-gradient(135deg, #5b6ef5, #9b59b6);
  overflow: hidden;
}
.model-badge-dot svg { width: 14px; height: 14px; }

/* ── CONTENT CARD ── */
.content-card {
  margin: 12px 14px 0;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 8px 40px rgba(0,0,0,0.4);
}
.content-inner {
  padding: 20px 20px 22px;
  font-size: 14px; line-height: 1.65; color: var(--text);
}

/* ── TYPOGRAPHY ── */
.content-inner h1 { font-size: 22px; font-weight: 800; margin: 20px 0 10px; color: #fff; }
.content-inner h2 { font-size: 19px; font-weight: 800; margin: 18px 0 9px; color: #fff; }
.content-inner h3 { font-size: 16px; font-weight: 700; margin: 16px 0 7px; color: #fff; }
.content-inner h4 { font-size: 14px; font-weight: 700; margin: 13px 0 5px; color: var(--accent2); }
.content-inner p { margin-bottom: 10px; }
.content-inner p:last-child { margin-bottom: 0; }
.content-inner strong { font-weight: 700; color: #fff; }
.content-inner em { font-style: italic; color: var(--text2); }

/* ── LISTS ── */
.content-inner ul, .content-inner ol {
  margin: 8px 0 12px; padding-left: 0; list-style: none;
}
.content-inner li {
  position: relative; padding: 4px 0 4px 22px;
  color: var(--text); line-height: 1.6;
  margin-bottom: 4px;
}
.content-inner ul li::before {
  content: '◆'; position: absolute; left: 0;
  color: var(--accent); font-size: 8px; top: 10px;
}
.content-inner ol { counter-reset: li; }
.content-inner ol li::before {
  counter-increment: li; content: counter(li);
  position: absolute; left: 0;
  background: var(--accent); color: #fff;
  width: 16px; height: 16px; border-radius: 4px;
  font-size: 10px; font-weight: 800;
  display: flex; align-items: center; justify-content: center;
  top: 4px;
}

/* ── INLINE CODE ── */
.content-inner code {
  background: rgba(255,255,255,0.08);
  padding: 2px 6px; border-radius: 4px;
  font-size: 12.5px; font-family: 'SF Mono','Fira Code','Consolas',monospace;
  color: var(--accent2);
}

/* ── CODE BLOCKS ── */
.code-wrapper {
  position: relative; margin: 14px 0;
  border-radius: 14px; overflow: hidden;
  width: 100%; box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  border: 1px solid rgba(91,110,245,0.2);
}
.code-header {
  display: flex; justify-content: space-between; align-items: center;
  background: linear-gradient(135deg, #0d0e1a, #161726);
  padding: 9px 14px; font-size: 11px;
  color: rgba(255,255,255,0.5); font-family: "SF Mono","Fira Code",monospace;
  border-bottom: 1px solid rgba(91,110,245,0.15);
}
.code-header > span:first-child {
  display: inline-flex; align-items: center; gap: 6px;
  font-weight: 700; letter-spacing: 0.5px; color: var(--accent2);
}
.code-header > span:first-child::before {
  content: ''; display: inline-block;
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent); box-shadow: 0 0 6px rgba(91,110,245,0.6);
}
.copy-btn {
  background: rgba(91,110,245,0.12);
  border: 1px solid rgba(91,110,245,0.25);
  color: rgba(255,255,255,0.6);
  padding: 4px 12px; border-radius: 6px;
  font-size: 11px; cursor: pointer;
  transition: all 0.15s; font-family: 'Manrope',sans-serif; white-space: nowrap;
}
.copy-btn:active, .copy-btn.copied {
  background: rgba(52,211,153,0.2); color: #34d399; border-color: rgba(52,211,153,0.3);
}
.code-wrapper pre {
  margin: 0 !important; border-radius: 0 0 14px 14px !important;
  background: #0f1117 !important; padding: 16px !important;
  overflow-x: auto !important; white-space: pre !important;
  word-break: normal !important; word-wrap: normal !important;
  font-size: 12.5px !important; line-height: 1.7 !important;
  max-height: none !important;
}
.code-wrapper pre code {
  font-family: "SF Mono","Fira Code","Consolas",monospace !important;
  background: transparent !important;
  padding: 0 !important;
  color: #abb2bf !important;
  display: block !important;
}

/* ── TABLES ── */
.content-inner table {
  width: 100%; border-collapse: collapse;
  margin: 14px 0; font-size: 13px;
  border-radius: 10px; overflow: hidden;
  border: 1px solid var(--border2);
}
.content-inner th {
  background: linear-gradient(135deg, rgba(91,110,245,0.15), rgba(155,89,182,0.1));
  color: var(--accent2); font-weight: 700;
  padding: 10px 12px; text-align: left;
  border-bottom: 2px solid var(--border2);
}
.content-inner td {
  padding: 9px 12px;
  border-bottom: 1px solid var(--border);
  background: var(--surface2);
}
.content-inner tr:last-child td { border-bottom: none; }
.content-inner tr:hover td { background: var(--surface3); }

/* ── BLOCKQUOTE ── */
.content-inner blockquote {
  margin: 12px 0; padding: 10px 14px 10px 16px;
  border-left: 3px solid var(--accent);
  background: rgba(91,110,245,0.05);
  border-radius: 0 8px 8px 0;
  font-style: italic; color: var(--text2);
}

/* ── HR ── */
.content-inner hr {
  border: none; height: 1px;
  background: linear-gradient(90deg, transparent, var(--border2), transparent);
  margin: 20px 0;
}

/* ── MATH (KaTeX) ── */
.math-inline, .math-display {
  display: inline-block;
}
.math-display {
  display: block;
  margin: 16px 0;
  text-align: center;
}
.katex { font-size: 1.15em !important; color: var(--text) !important; }
.katex-display { 
  margin: 18px 0 !important; 
  overflow-x: auto; 
  overflow-y: hidden;
  padding: 12px 0;
}
.katex-html { color: var(--text) !important; }
</style>
</head>
<body>

<!-- Loading State -->
<div id="loadingState">
  <div class="spinner"></div>
  <div style="font-size:14px;color:var(--text2);">Загрузка ответа...</div>
</div>

<!-- Error State -->
<div id="errorState" style="display:none;">
  <div style="font-size:48px;margin-bottom:16px;">⚠️</div>
  <div style="font-size:18px;font-weight:700;margin-bottom:8px;">Ошибка загрузки</div>
  <div style="font-size:13px;color:var(--text2);">Неверная ссылка или данные повреждены</div>
</div>

<!-- Main Content -->
<div id="mainContent">
  <div class="page">
    <div class="header">
      <div class="header-logo">🤖</div>
      <div class="header-info">
        <div class="header-title" id="modelName">ИИ</div>
        <div class="header-sub" id="headerSub">Ответ</div>
      </div>
      <button class="header-copy-btn" id="copyBtn">✈️ Поделиться</button>
    </div>

    <div class="model-badge">
      <div class="model-badge-dot" id="modelDot">🤖</div>
      <span id="msgTime"></span>
    </div>

    <div class="content-card">
      <div class="content-inner" id="contentInner">
        <!-- Content будет добавлен через JS -->
      </div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════
// ФОРМАТИРОВАНИЕ ТЕКСТА с поддержкой математики, кода, таблиц
// ══════════════════════════════════════════════════════════

function escHtml(str) {
  return (str || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function formatText(text) {
  if (!text) return "";

  const PH = {}; // Плейсхолдеры для сохранения блоков
  let phId = 0;

  // 1. ПЕРВЫМ ДЕЛОМ сохраняем математические формулы (до любого форматирования!)
  // Блочные: $$...$$
  text = text.replace(/\$\$([\s\S]*?)\$\$/g, (match, math) => {
    const id = `__MATH_BLOCK${phId++}__`;
    PH[id] = `<span class="math-display">$$${math.trim()}$$</span>`;
    return id;
  });
  
  // Инлайн: $...$  (но не $$)
  text = text.replace(/\$([^\$\n]+?)\$/g, (match, math) => {
    const id = `__MATH_INLINE${phId++}__`;
    PH[id] = `<span class="math-inline">$${math}$</span>`;
    return id;
  });

  // 2. Сохраняем блоки кода ```
  text = text.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
    const id = `__CODE${phId++}__`;
    const cleanCode = code.trim();
    const langName = lang || "text";
    PH[id] = `<div class="code-wrapper">
      <div class="code-header">
        <span>${escHtml(langName)}</span>
        <button class="copy-btn" onclick="copyCode(this)">Копировать</button>
      </div>
      <pre><code class="language-${escHtml(langName)}" data-raw="${escHtml(cleanCode)}">${escHtml(cleanCode)}</code></pre>
    </div>`;
    return id;
  });

  // 3. Сохраняем inline code
  const inlineCodeMap = {};
  text = text.replace(/`([^`\n]+)`/g, (_, c) => {
    const id = `__IC${phId++}__`;
    inlineCodeMap[id] = `<code>${escHtml(c)}</code>`;
    return id;
  });

  // 4. Таблицы (markdown style)
  text = text.replace(/(\|.+\|[\r\n]+\|[-:\s|]+\|[\r\n]+((?:\|.+\|[\r\n]*)+))/gm, (match) => {
    const id = `__TBL${phId++}__`;
    const lines = match.trim().split(/[\r\n]+/).filter(l => l.trim());
    if (lines.length < 3) return match;
    
    const headers = lines[0].split('|').filter(h => h.trim()).map(h => h.trim());
    const rows = lines.slice(2).map(row => row.split('|').filter(c => c.trim()).map(c => c.trim()));
    
    let html = '<table><thead><tr>';
    headers.forEach(h => html += `<th>${escHtml(h)}</th>`);
    html += '</tr></thead><tbody>';
    rows.forEach(row => {
      html += '<tr>';
      row.forEach(cell => html += `<td>${escHtml(cell)}</td>`);
      html += '</tr>';
    });
    html += '</tbody></table>';
    PH[id] = html;
    return id;
  });

  // 5. Headers
  text = text.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  text = text.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  text = text.replace(/^# (.+)$/gm, '<h1>$1</h1>');

  // 6. Blockquote
  text = text.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');

  // 7. Bold & Italic
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');

  // 8. Numbered lists
  text = text.replace(/^(\d+)\.\s+(.+)$/gm, (_, n, content) =>
    `<li style="list-style:none;position:relative;padding-left:24px;margin-bottom:4px">` +
    `<span style="position:absolute;left:0;top:4px;background:var(--accent);color:#fff;` +
    `width:16px;height:16px;border-radius:4px;font-size:10px;font-weight:800;` +
    `display:inline-flex;align-items:center;justify-content:center">${n}</span>${content}</li>`
  );

  // 9. Bullet lists
  text = text.replace(/^[-*•]\s+(.+)$/gm,
    `<li style="list-style:none;position:relative;padding-left:22px;margin-bottom:4px">` +
    `<span style="position:absolute;left:0;top:10px;width:8px;height:8px;border-radius:50%;` +
    `background:var(--accent);display:inline-block"></span>$1</li>`
  );

  // 10. HR
  text = text.replace(/^---+$/gm, "<hr>");

  // 11. Newlines → <br>
  text = text.replace(/\n/g, "<br>");

  // 12. Восстанавливаем inline code
  for (const [id, html] of Object.entries(inlineCodeMap)) {
    text = text.split(id).join(html);
  }

  // 13. Восстанавливаем все сохраненные блоки (код, таблицы, формулы)
  for (const [id, html] of Object.entries(PH)) {
    text = text.split(id).join(html);
  }

  return text;
}

function copyCode(btn) {
  const codeEl = btn.closest(".code-wrapper").querySelector("code");
  const raw = codeEl ? (codeEl.getAttribute("data-raw") || codeEl.innerText) : "";
  const decoded = raw.replace(/&amp;/g,"&").replace(/&lt;/g,"<").replace(/&gt;/g,">").replace(/&quot;/g,'"');
  navigator.clipboard.writeText(decoded).then(() => {
    btn.textContent = "✓ Скопировано"; btn.classList.add("copied");
    setTimeout(() => { btn.textContent = "Копировать"; btn.classList.remove("copied"); }, 1800);
  });
}

let rawAnswerText = "";
function copyAll() {
  navigator.clipboard.writeText(rawAnswerText).then(() => {
    const btn = document.getElementById("copyBtn");
    btn.textContent = "✅ Скопировано"; btn.classList.add("copied");
    setTimeout(() => { btn.textContent = "📋 Копировать"; btn.classList.remove("copied"); }, 2000);
  });
}

// ── MODEL ICONS ──────────────────────────────────────────
const MODEL_ICONS = {
  claude_sonnet:`<svg viewBox="0 0 24 24" fill="none" width="14" height="14"><circle cx="12" cy="12" r="10" fill="#CC785C"/><path d="M8 12.5c1-2 3-3.5 4-3.5s3 1.5 4 3.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/><circle cx="9" cy="9.5" r="1" fill="white"/><circle cx="15" cy="9.5" r="1" fill="white"/></svg>`,
  claude_haiku: `<svg viewBox="0 0 24 24" fill="none" width="14" height="14"><circle cx="12" cy="12" r="10" fill="#CC785C"/><path d="M9 12.5c.8-1.5 1.8-2.5 3-2.5s2.2 1 3 2.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/><circle cx="9.5" cy="10" r="0.8" fill="white"/><circle cx="14.5" cy="10" r="0.8" fill="white"/></svg>`,
  claude_opus:  `<svg viewBox="0 0 24 24" fill="none" width="14" height="14"><circle cx="12" cy="12" r="10" fill="#8B4513"/><path d="M7.5 13c1.5-3 3-4.5 4.5-4.5s3 1.5 4.5 4.5" stroke="white" stroke-width="2" stroke-linecap="round"/><circle cx="8.5" cy="9" r="1.2" fill="white"/><circle cx="15.5" cy="9" r="1.2" fill="white"/></svg>`,
  gpt52:        `<svg viewBox="0 0 24 24" fill="none" width="14" height="14"><circle cx="12" cy="12" r="10" fill="#10a37f"/><path d="M12 6.5A5.5 5.5 0 0112 17.5M8.5 8.5a5.5 5.5 0 017 7M7 12h10" stroke="white" stroke-width="1.4" stroke-linecap="round"/></svg>`,
};
const AV_COLORS = {
  claude: "linear-gradient(135deg,#667eea,#764ba2)",
  gpt:    "linear-gradient(135deg,#11998e,#38ef7d)",
  deep:   "linear-gradient(135deg,#2193b0,#6dd5ed)",
  qwen:   "linear-gradient(135deg,#f7971e,#ffd200)",
  llama:  "linear-gradient(135deg,#834d9b,#d04ed6)",
};
function getModelStyle(modelKey) {
  const k = (modelKey || "").toLowerCase();
  let bg = "linear-gradient(135deg,#5b6ef5,#9b59b6)";
  let icon = MODEL_ICONS[k] || '🤖';
  for (const [prefix, grad] of Object.entries(AV_COLORS)) {
    if (k.includes(prefix)) { bg = grad; break; }
  }
  return { bg, icon };
}

// ══════════════════════════════════════════════════════════
// DECODE — поддержка ОБОИХ форматов:
//   #z=...   — LZ-сжатый (КОРОТКИЙ)
//   #data=.. — base64 (совместимость)
// ══════════════════════════════════════════════════════════
function getDataFromUrl() {
  const hash   = location.hash;
  const search = location.search;
  let encoded = "", mode = "";

  if (hash.startsWith("#z=")) {
    encoded = hash.slice(3); mode = "lz";
  } else if (hash.startsWith("#data=")) {
    encoded = hash.slice(6); mode = "b64";
  } else if (search) {
    const p = new URLSearchParams(search);
    if (p.get("z"))      { encoded = p.get("z"); mode = "lz"; }
    else if (p.get("d")) { encoded = p.get("d"); mode = "b64"; }
  }
  return { encoded, mode };
}

function decodeData(encoded, mode) {
  try {
    if (mode === "lz") {
      const json = LZString.decompressFromEncodedURIComponent(encoded);
      if (!json) throw new Error("LZ decompress failed");
      return JSON.parse(json);
    } else {
      const b64  = encoded.replace(/-/g, "+").replace(/_/g, "/");
      const json = decodeURIComponent(escape(atob(b64)));
      return JSON.parse(json);
    }
  } catch(e) { 
    console.error("Decode error:", e);
    return null; 
  }
}

// ── Init ─────────────────────────────────────────────────
window.addEventListener("DOMContentLoaded", () => {
  const { encoded, mode } = getDataFromUrl();

  if (!encoded) {
    document.getElementById("loadingState").style.display = "none";
    document.getElementById("errorState").style.display = "flex";
    return;
  }

  const data = decodeData(encoded, mode);
  if (!data || !data.text) {
    document.getElementById("loadingState").style.display = "none";
    document.getElementById("errorState").style.display = "flex";
    return;
  }

  rawAnswerText = data.text;

  // Header
  document.getElementById("modelName").textContent = data.model || "ИИ";
  document.getElementById("msgTime").textContent   = data.time  || "";
  document.getElementById("headerSub").textContent = `${data.model || "ИИ"} · ${data.time || ""}`;
  document.title = "Хуза ИИ · " + (data.model || "ИИ");

  // Model dot
  const style = getModelStyle(data.modelKey || "");
  const dot   = document.getElementById("modelDot");
  dot.style.background = style.bg;
  dot.innerHTML = style.icon;

  // Render content
  const contentEl = document.getElementById("contentInner");
  contentEl.innerHTML = formatText(data.text);

  // Highlight.js — подсветка кода
  contentEl.querySelectorAll("pre code").forEach(block => {
    hljs.highlightElement(block);
  });

  // KaTeX — рендер формул ПОСЛЕ всего остального
  // Увеличиваем таймаут чтобы DOM успел обновиться
  setTimeout(() => {
    try {
      renderMathInElement(contentEl, {
        delimiters: [
          { left: "$$",  right: "$$",  display: true  },
          { left: "$",   right: "$",   display: false },
          { left: "\\(", right: "\\)", display: false },
          { left: "\\[", right: "\\]", display: true  },
        ],
        throwOnError: false,
        errorColor: "#f87171",
        strict: false,
        trust: true,
        fleqn: false,
        macros: {
          "\\RR": "\\mathbb{R}",
          "\\NN": "\\mathbb{N}",
          "\\ZZ": "\\mathbb{Z}",
          "\\QQ": "\\mathbb{Q}",
        }
      });
      console.log("KaTeX rendered successfully");
    } catch(e) { 
      console.error("KaTeX error:", e); 
    }
  }, 200);

  // Show content
  document.getElementById("loadingState").style.display = "none";
  document.getElementById("mainContent").style.display  = "block";

  // Share button
  document.getElementById("copyBtn").onclick = () => shareAnswer(data);
});

function shareAnswer(data) {
  const viewUrl   = window.location.href;
  const modelName = data.model || "ИИ";
  const preview   = (data.text || "").replace(/[*_`#\[\]$]/g,"").substring(0,120).trim();
  const previewText = preview.length >= 120 ? preview + "..." : preview;
  const tgShareUrl  = `https://t.me/share/url?url=${encodeURIComponent(viewUrl)}&text=${encodeURIComponent(`🤖 Хуза ИИ — Ответ от ${modelName}\n\n${previewText}`)}`;

  if (window.Telegram && window.Telegram.WebApp) {
    try { window.Telegram.WebApp.openTelegramLink(tgShareUrl); return; } catch(e) {}
  }
  window.open(tgShareUrl, "_blank");
  navigator.clipboard.writeText(viewUrl).catch(() => {});

  const btn = document.getElementById("copyBtn");
  const orig = btn.textContent;
  btn.textContent = "✅ Скопировано!"; btn.classList.add("copied");
  setTimeout(() => { btn.textContent = orig; btn.classList.remove("copied"); }, 2500);
}
</script>
