<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Хуза ИИ — Ответ</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<style>
:root {
  --bg: #0c0c14;
  --surface: #13131f;
  --surface2: #1a1a2a;
  --surface3: #222235;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text: #eeeeff;
  --text2: rgba(238,238,255,0.6);
  --text3: rgba(238,238,255,0.3);
  --accent: #6c7ff5;
  --accent2: #9ba8f8;
  --accent-glow: rgba(108,127,245,0.3);
  --green: #34d399;
  --yellow: #fbbf24;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Manrope', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── Background decoration ── */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 20% 0%, rgba(108,127,245,0.12) 0%, transparent 60%),
    radial-gradient(ellipse 40% 30% at 80% 100%, rgba(155,90,245,0.08) 0%, transparent 50%);
  pointer-events: none; z-index: 0;
}

.page {
  position: relative; z-index: 1;
  max-width: 700px;
  margin: 0 auto;
  padding: 0 0 60px;
}

/* ── Header ── */
.header {
  padding: 24px 20px 18px;
  display: flex; align-items: center; gap: 12px;
  border-bottom: 1px solid var(--border);
  background: rgba(19,19,31,0.8);
  backdrop-filter: blur(12px);
  position: sticky; top: 0; z-index: 10;
}

.header-logo {
  width: 38px; height: 38px;
  border-radius: 11px;
  background: linear-gradient(135deg, #6c7ff5, #9b59b6);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
  box-shadow: 0 4px 14px rgba(108,127,245,0.35);
}

.header-info { flex: 1; min-width: 0; }
.header-title { font-size: 15px; font-weight: 800; }
.header-sub { font-size: 11px; color: var(--text3); margin-top: 1px; }

.header-copy-btn {
  background: var(--surface2);
  border: 1px solid var(--border2);
  color: var(--text2);
  border-radius: 10px;
  padding: 8px 14px;
  font-size: 12px; font-weight: 700;
  font-family: 'Manrope', sans-serif;
  cursor: pointer;
  transition: all 0.15s;
  flex-shrink: 0;
}
.header-copy-btn:active { opacity: 0.7; }
.header-copy-btn.copied { background: rgba(52,211,153,0.15); color: var(--green); border-color: rgba(52,211,153,0.3); }

/* ── Model badge ── */
.model-badge {
  margin: 16px 20px 0;
  display: inline-flex;
  align-items: center; gap: 8px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 6px 12px 6px 8px;
  font-size: 12px; font-weight: 700;
  color: var(--text2);
}
.model-badge-dot {
  width: 22px; height: 22px;
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
  background: linear-gradient(135deg, #667eea, #764ba2);
}

/* ── Content card ── */
.content-card {
  margin: 14px 16px 0;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 8px 40px rgba(0,0,0,0.4);
}

.content-inner {
  padding: 22px 22px 24px;
  font-size: 15px;
  line-height: 1.7;
  color: var(--text);
}

/* ── Typography in content ── */
.content-inner h2 {
  font-size: 20px; font-weight: 800;
  margin: 20px 0 10px;
  color: #fff;
}
.content-inner h3 {
  font-size: 17px; font-weight: 700;
  margin: 18px 0 8px;
  color: #fff;
}
.content-inner h4 {
  font-size: 15px; font-weight: 700;
  margin: 14px 0 6px;
  color: var(--accent2);
}
.content-inner p { margin-bottom: 10px; }
.content-inner p:last-child { margin-bottom: 0; }
.content-inner strong { font-weight: 700; color: #fff; }
.content-inner em { font-style: italic; color: var(--text2); }

/* ── Lists ── */
.content-inner ul, .content-inner ol {
  margin: 8px 0 12px 0;
  padding-left: 0;
  list-style: none;
}
.content-inner li {
  position: relative;
  padding: 4px 0 4px 22px;
  color: var(--text);
  line-height: 1.6;
}
.content-inner ul li::before {
  content: '◆';
  position: absolute; left: 0;
  color: var(--accent); font-size: 8px;
  top: 9px;
}
.content-inner ol { counter-reset: li; }
.content-inner ol li::before {
  counter-increment: li;
  content: counter(li);
  position: absolute; left: 0;
  background: var(--accent);
  color: #fff;
  width: 16px; height: 16px;
  border-radius: 5px;
  font-size: 10px; font-weight: 800;
  display: flex; align-items: center; justify-content: center;
  top: 6px;
}

/* ── Inline code ── */
.content-inner code {
  background: rgba(108,127,245,0.12);
  border: 1px solid rgba(108,127,245,0.2);
  padding: 2px 6px;
  border-radius: 5px;
  font-size: 13px;
  font-family: 'SF Mono', 'Fira Code', monospace;
  color: var(--accent2);
}

/* ── Code blocks ── */
.code-block-wrap {
  margin: 14px 0;
  border-radius: 14px;
  overflow: hidden;
  border: 1px solid rgba(108,127,245,0.2);
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}
.code-block-header {
  display: flex; justify-content: space-between; align-items: center;
  background: linear-gradient(135deg, #0d0e1a, #161726);
  padding: 9px 14px;
  border-bottom: 1px solid rgba(108,127,245,0.15);
}
.code-block-lang {
  font-size: 11px; font-weight: 700;
  color: var(--accent2);
  font-family: 'SF Mono', monospace;
  letter-spacing: 0.5px;
  display: flex; align-items: center; gap: 6px;
}
.code-block-lang::before {
  content: ''; width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 6px rgba(108,127,245,0.6);
  display: inline-block;
}
.code-copy-btn {
  background: rgba(108,127,245,0.12);
  border: 1px solid rgba(108,127,245,0.25);
  color: rgba(255,255,255,0.55);
  padding: 4px 12px;
  border-radius: 6px;
  font-size: 11px; font-weight: 600;
  cursor: pointer;
  font-family: 'Manrope', sans-serif;
  transition: all 0.15s;
}
.code-copy-btn:active { background: rgba(52,211,153,0.2); color: #34d399; }
.code-block-wrap pre {
  margin: 0 !important;
  padding: 16px !important;
  background: #0f1117 !important;
  border-radius: 0 !important;
  overflow-x: auto;
  font-size: 13px !important;
  line-height: 1.6 !important;
}
.code-block-wrap pre code {
  font-family: 'SF Mono','Fira Code','Consolas',monospace !important;
  background: none !important;
  border: none !important;
  padding: 0 !important;
}

/* ── Tables ── */
.table-wrap {
  overflow-x: auto;
  margin: 14px 0;
  border-radius: 12px;
  border: 1px solid var(--border2);
  box-shadow: 0 2px 12px rgba(0,0,0,0.3);
}
.content-inner table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.content-inner th {
  background: linear-gradient(135deg, rgba(108,127,245,0.2), rgba(108,127,245,0.1));
  color: var(--accent2);
  font-weight: 700;
  padding: 10px 14px;
  text-align: left;
  border-bottom: 1px solid rgba(108,127,245,0.3);
  white-space: nowrap;
}
.content-inner td {
  padding: 9px 14px;
  border-bottom: 1px solid var(--border);
  color: var(--text);
  line-height: 1.5;
}
.content-inner tr:last-child td { border-bottom: none; }
.content-inner tr:hover td { background: rgba(108,127,245,0.04); }

/* ── KaTeX math ── */
.katex-display {
  overflow-x: auto;
  padding: 6px 0;
  margin: 12px 0 !important;
}
.katex { font-size: 1.05em; }

/* ── Blockquote ── */
.content-inner blockquote {
  border-left: 3px solid var(--accent);
  background: rgba(108,127,245,0.06);
  padding: 10px 16px;
  border-radius: 0 10px 10px 0;
  margin: 12px 0;
  color: var(--text2);
  font-style: italic;
}

/* ── Divider ── */
.content-inner hr {
  border: none;
  border-top: 1px solid var(--border2);
  margin: 16px 0;
}

/* ── Footer ── */
.footer {
  margin: 20px 16px 0;
  display: flex; align-items: center; gap: 10px;
  flex-wrap: wrap;
}
.footer-info {
  font-size: 11px; color: var(--text3);
  flex: 1;
}
.footer-open-btn {
  display: inline-flex; align-items: center; gap: 6px;
  background: linear-gradient(135deg, #6c7ff5, #9b59b6);
  color: #fff;
  border: none;
  border-radius: 12px;
  padding: 10px 18px;
  font-size: 13px; font-weight: 700;
  font-family: 'Manrope', sans-serif;
  cursor: pointer;
  text-decoration: none;
  box-shadow: 0 4px 16px rgba(108,127,245,0.35);
  transition: opacity 0.15s;
}
.footer-open-btn:active { opacity: 0.8; }

/* ── Loading state ── */
.loading {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 60vh; gap: 16px;
  color: var(--text3);
}
.loading-spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--border2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Error state ── */
.error-box {
  margin: 40px 20px;
  background: rgba(248,113,113,0.08);
  border: 1px solid rgba(248,113,113,0.25);
  border-radius: 16px;
  padding: 24px;
  text-align: center;
}
.error-box-ico { font-size: 36px; margin-bottom: 12px; }
.error-box-title { font-size: 17px; font-weight: 800; color: #f87171; margin-bottom: 6px; }
.error-box-sub { font-size: 13px; color: var(--text2); line-height: 1.5; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }
</style>
</head>
<body>

<div class="page">
  <!-- Header -->
  <div class="header">
    <div class="header-logo">🤖</div>
    <div class="header-info">
      <div class="header-title">Хуза — Ответ ИИ</div>
      <div class="header-sub" id="headerSub">Загрузка...</div>
    </div>
    <button class="header-copy-btn" id="copyBtn" onclick="copyAll()">📋 Копировать</button>
  </div>

  <!-- Loading -->
  <div class="loading" id="loadingState">
    <div class="loading-spinner"></div>
    <div>Загружаю ответ...</div>
  </div>

  <!-- Error -->
  <div class="error-box" id="errorState" style="display:none">
    <div class="error-box-ico">😔</div>
    <div class="error-box-title">Ответ не найден</div>
    <div class="error-box-sub">Ссылка недействительна или данные повреждены.<br>Попроси отправить ссылку заново.</div>
  </div>

  <!-- Content -->
  <div id="mainContent" style="display:none">
    <div class="model-badge">
      <div class="model-badge-dot" id="modelDot">🤖</div>
      <span id="modelName">ИИ</span>
      <span style="color:var(--text3)">·</span>
      <span id="msgTime" style="color:var(--text3);font-weight:500"></span>
    </div>

    <div class="content-card">
      <div class="content-inner" id="contentInner"></div>
    </div>

    <div class="footer">
      <div class="footer-info">Создано в <strong style="color:var(--accent2)">Хуза ИИ</strong></div>
      <a class="footer-open-btn" href="https://t.me/iihuzandelpiibot" target="_blank">
        ✈️ Открыть Хуза ИИ
      </a>
    </div>
  </div>
</div>

<script>
// ── Helpers ──────────────────────────────────────────────
function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function formatText(rawText) {
  let text = rawText;

  // 1. Code blocks → placeholder
  let codeIdx = 0;
  const codePlaceholders = {};
  text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
    const id = "\x00CODE_" + (codeIdx++) + "\x00";
    const rawCode = code.trim();
    const escaped = escHtml(rawCode);
    const langLabel = lang ? lang.toUpperCase() : "CODE";
    codePlaceholders[id] = `<div class="code-block-wrap">
      <div class="code-block-header">
        <span class="code-block-lang">${langLabel}</span>
        <button class="code-copy-btn" onclick="copyCode(this)">Копировать</button>
      </div>
      <pre><code class="${lang ? 'language-' + lang : ''}" data-raw="${escHtml(rawCode).replace(/"/g,'&quot;')}">${escaped}</code></pre>
    </div>`;
    return id;
  });

  // 2. Tables
  text = text.replace(/\n?((?:\|.+\|\n?)+)/g, (match) => {
    const lines = match.trim().split("\n").filter(l => l.trim());
    if (lines.length < 2) return match;
    const isSep = l => /^[\|\s\-:]+$/.test(l);
    let html = '<div class="table-wrap"><table>';
    let firstRow = true;
    for (const line of lines) {
      if (isSep(line)) continue;
      const cells = line.split("|").filter((_, i, a) => i > 0 && i < a.length - 1);
      if (firstRow) {
        html += '<tr>' + cells.map(c => `<th>${c.trim()}</th>`).join('') + '</tr>';
        firstRow = false;
      } else {
        html += '<tr>' + cells.map(c => `<td>${c.trim()}</td>`).join('') + '</tr>';
      }
    }
    html += '</table></div>';
    return html;
  });

  // 3. Bold/italic
  text = text.replace(/\*\*\*(.+?)\*\*\*/g, "<strong><em>$1</em></strong>");
  text = text.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
  text = text.replace(/\*([^*\n]+?)\*/g, "<em>$1</em>");

  // 4. Headers
  text = text.replace(/^###\s+(.+)$/gm, "<h4>$1</h4>");
  text = text.replace(/^##\s+(.+)$/gm, "<h3>$1</h3>");
  text = text.replace(/^#\s+(.+)$/gm, "<h2>$1</h2>");

  // 5. Blockquote
  text = text.replace(/^>\s+(.+)$/gm, "<blockquote>$1</blockquote>");

  // 6. Lists
  text = text.replace(/^[-*•]\s+(.+)$/gm, "<li>$1</li>");
  text = text.replace(/(<li>.*<\/li>)/gs, "<ul>$1</ul>");
  text = text.replace(/^\d+\.\s+(.+)$/gm, "<li>$1</li>");

  // 7. Inline code
  text = text.replace(/`([^`\n]+)`/g, (_, c) => `<code>${escHtml(c)}</code>`);

  // 8. HR
  text = text.replace(/^---+$/gm, "<hr>");

  // 9. Preserve LaTeX from \n replacement
  const latexPH = {};
  let lIdx = 0;
  text = text.replace(/\$\$([\s\S]+?)\$\$/g, m => { const id = "\x00L"+(lIdx++)+"\x00"; latexPH[id]=m; return id; });
  text = text.replace(/\\\[([\s\S]+?)\\\]/g, m => { const id = "\x00L"+(lIdx++)+"\x00"; latexPH[id]=m; return id; });

  // 10. Newlines
  text = text.replace(/\n/g, "<br>");

  // Restore LaTeX
  for (const [id, orig] of Object.entries(latexPH)) {
    text = text.split(id).join(orig);
  }

  // 11. Restore code blocks
  for (const [id, html] of Object.entries(codePlaceholders)) {
    text = text.split(id).join(html);
  }

  // Wrap bare paragraphs
  text = text.replace(/<br><br>/g, "</p><p>");
  text = "<p>" + text + "</p>";
  text = text.replace(/<p>\s*<\/p>/g, "");

  return text;
}

function copyCode(btn) {
  const codeEl = btn.closest(".code-block-wrap").querySelector("code");
  const raw = codeEl ? (codeEl.getAttribute("data-raw") || codeEl.innerText) : "";
  const decoded = raw.replace(/&amp;/g,"&").replace(/&lt;/g,"<").replace(/&gt;/g,">").replace(/&quot;/g,'"');
  navigator.clipboard.writeText(decoded).then(() => {
    btn.textContent = "✓";
    setTimeout(() => btn.textContent = "Копировать", 1800);
  });
}

let rawAnswerText = "";

function copyAll() {
  navigator.clipboard.writeText(rawAnswerText).then(() => {
    const btn = document.getElementById("copyBtn");
    btn.textContent = "✅ Скопировано";
    btn.classList.add("copied");
    setTimeout(() => { btn.textContent = "📋 Копировать"; btn.classList.remove("copied"); }, 2000);
  });
}

// ── Parse URL hash ────────────────────────────────────────
function getDataFromUrl() {
  // Поддерживаем два формата:
  // 1. #data=BASE64   (encoded answer + meta)
  // 2. ?d=BASE64      (fallback query param)
  const hash = location.hash;
  const search = location.search;

  let encoded = "";
  if (hash.startsWith("#data=")) {
    encoded = hash.slice(6);
  } else if (search) {
    const params = new URLSearchParams(search);
    encoded = params.get("d") || "";
  }
  return encoded;
}

function decodeData(encoded) {
  try {
    // URL-safe base64 → standard base64
    const b64 = encoded.replace(/-/g, "+").replace(/_/g, "/");
    const json = decodeURIComponent(escape(atob(b64)));
    return JSON.parse(json);
  } catch (e) {
    return null;
  }
}

// ── Init ─────────────────────────────────────────────────
window.addEventListener("DOMContentLoaded", () => {
  const encoded = getDataFromUrl();

  if (!encoded) {
    document.getElementById("loadingState").style.display = "none";
    document.getElementById("errorState").style.display = "block";
    return;
  }

  const data = decodeData(encoded);

  if (!data || !data.text) {
    document.getElementById("loadingState").style.display = "none";
    document.getElementById("errorState").style.display = "block";
    return;
  }

  // Populate
  rawAnswerText = data.text;

  document.getElementById("modelName").textContent = data.model || "ИИ";
  document.getElementById("msgTime").textContent = data.time || "";
  document.getElementById("headerSub").textContent = `${data.model || "ИИ"} · ${data.time || ""}`;
  document.title = "Хуза ИИ · " + (data.model || "ИИ");

  // Set model avatar color
  const modelKey = (data.modelKey || "").toLowerCase();
  let dotBg = "linear-gradient(135deg, #667eea, #764ba2)";
  let dotEmoji = "🤖";
  if (modelKey.includes("claude"))      { dotBg = "linear-gradient(135deg, #d4845a, #c9512f)"; dotEmoji = "🔷"; }
  else if (modelKey.includes("gpt"))    { dotBg = "linear-gradient(135deg, #10a37f, #0a7a5f)"; dotEmoji = "⚡"; }
  else if (modelKey.includes("deep"))   { dotBg = "linear-gradient(135deg, #4e6ef2, #2a42c4)"; dotEmoji = "🧬"; }
  else if (modelKey.includes("qwen"))   { dotBg = "linear-gradient(135deg, #f59e0b, #d97706)"; dotEmoji = "🌐"; }
  else if (modelKey.includes("command")){ dotBg = "linear-gradient(135deg, #6b7280, #374151)"; dotEmoji = "⚙️"; }
  else if (modelKey.includes("kimi"))   { dotBg = "linear-gradient(135deg, #ec4899, #be185d)"; dotEmoji = "🌙"; }

  const dot = document.getElementById("modelDot");
  dot.style.background = dotBg;
  dot.textContent = dotEmoji;

  // Render content
  const contentEl = document.getElementById("contentInner");
  contentEl.innerHTML = formatText(data.text);

  // Highlight code
  contentEl.querySelectorAll("pre code").forEach(block => {
    hljs.highlightElement(block);
  });

  // Render math
  try {
    renderMathInElement(contentEl, {
      delimiters: [
        { left: "$$",  right: "$$",  display: true  },
        { left: "$",   right: "$",   display: false },
        { left: "\\(", right: "\\)", display: false },
        { left: "\\[", right: "\\]", display: true  },
      ],
      throwOnError: false
    });
  } catch(e) {}

  // Show
  document.getElementById("loadingState").style.display = "none";
  document.getElementById("mainContent").style.display = "block";
});
</script>
</body>
</html>
